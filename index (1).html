<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sell an AI Service From Scratch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #fff; color: #37352f; min-height: 100vh; }

  /* Scrollbars */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 3px; }

  /* Top nav */
  .topnav {
    height: 45px; border-bottom: 1px solid #e9e9e7;
    display: flex; align-items: center; padding: 0 20px;
    gap: 6px; background: #fff; position: sticky; top: 0; z-index: 100;
  }
  .breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #9b9a97; }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: #37352f; }
  .breadcrumb .sep { color: #d3d1cb; font-size: 11px; }
  .breadcrumb .current { color: #37352f; font-weight: 600; }
  .nav-progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .nav-progress-bar { width: 140px; height: 4px; background: #e9e9e7; border-radius: 2px; overflow: hidden; }
  .nav-progress-fill { height: 100%; background: #37352f; border-radius: 2px; transition: width 0.4s; }
  .nav-pct { font-size: 12px; color: #9b9a97; font-weight: 700; min-width: 32px; }

  /* Page header */
  .page-header { padding: 36px 40px 0; }
  .page-emoji { font-size: 48px; margin-bottom: 10px; display: block; }
  .page-title { font-size: 36px; font-weight: 900; color: #37352f; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 6px; }
  .page-subtitle { font-size: 13px; color: #9b9a97; margin-bottom: 18px; }
  .props { display: flex; align-items: center; gap: 0; flex-wrap: wrap; margin-bottom: 20px; }
  .prop { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; font-size: 12px; color: #9b9a97; cursor: default; }
  .prop:hover { background: #f7f7f5; }
  .prop-icon { font-size: 13px; }
  .prop-label { color: #9b9a97; }
  .prop-value { color: #37352f; font-weight: 600; }
  .divider { height: 1px; background: #e9e9e7; margin: 0 40px; }

  /* View tabs */
  .view-tabs { padding: 10px 40px 0; display: flex; align-items: center; gap: 2px; }
  .tab { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 4px; font-size: 13px; color: #9b9a97; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #37352f; font-weight: 600; border-bottom-color: #37352f; border-radius: 4px 4px 0 0; }
  .tab:hover:not(.active) { background: #f7f7f5; }

  /* Board */
  .board-wrap { overflow-x: auto; padding: 16px 40px 40px; display: flex; gap: 12px; align-items: flex-start; min-height: calc(100vh - 240px); }

  /* Column */
  .col { width: 264px; flex-shrink: 0; }
  .col-head { padding: 0 0 10px; }
  .col-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .col-icon { font-size: 14px; }
  .col-name { font-size: 13px; font-weight: 700; color: #37352f; flex: 1; }
  .col-count { font-size: 12px; color: #9b9a97; }
  .step-badge { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
  .col-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .col-time { font-size: 11px; color: #9b9a97; }
  .status-btn { display: flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 4px; border: 1px solid #e9e9e7; background: #fff; cursor: pointer; font-size: 11px; font-family: 'Lato', sans-serif; color: #37352f; position: relative; transition: background 0.1s; }
  .status-btn:hover { background: #f7f7f5; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dropdown { position: absolute; top: 110%; left: 0; background: #fff; border: 1px solid #e9e9e7; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 200; min-width: 140px; padding: 4px; }
  .status-opt { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #37352f; }
  .status-opt:hover { background: #f7f7f5; }
  .col-progress { height: 3px; background: #e9e9e7; border-radius: 2px; overflow: hidden; }
  .col-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Cards */
  .cards { padding-top: 8px; }
  .card {
    background: #fff; border: 1px solid #e9e9e7; border-radius: 6px;
    margin-bottom: 6px; overflow: hidden; cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #d3d1cb; }
  .card-head { padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px; }
  .card-cb { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid #d3d1cb; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
  .card-cb.done { background: #37352f; border-color: #37352f; }
  .card-cb.done::after { content: '✓'; color: #fff; font-size: 9px; font-weight: 900; }
  .card-body { flex: 1; }
  .card-title { font-size: 13px; color: #37352f; font-weight: 600; line-height: 1.4; }
  .card-title.done { color: #9b9a97; text-decoration: line-through; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .tag { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 3px; letter-spacing: 0.3px; text-transform: uppercase; }
  .card-mini-progress { flex: 1; height: 3px; background: #e9e9e7; border-radius: 2px; overflow: hidden; max-width: 80px; }
  .card-mini-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .card-task-count { font-size: 11px; color: #9b9a97; }
  .card-arrow { color: #9b9a97; font-size: 10px; flex-shrink: 0; margin-top: 2px; transition: transform 0.2s; }
  .card-arrow.open { transform: rotate(180deg); }

  /* Task list */
  .task-list { border-top: 1px solid #f1f1ef; padding: 6px 10px 8px; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 6px; border-radius: 3px; cursor: pointer; transition: background 0.1s; }
  .task-item:hover { background: #f7f7f5; }
  .task-cb { width: 14px; height: 14px; border-radius: 2px; border: 1.5px solid #d3d1cb; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .task-cb.done { background: #37352f; border-color: #37352f; }
  .task-cb.done::after { content: '✓'; color: #fff; font-size: 8px; font-weight: 900; }
  .task-text { font-size: 12px; color: #37352f; line-height: 1.55; }
  .task-text.done { color: #9b9a97; text-decoration: line-through; text-decoration-color: #c5c5c0; }

  /* Add new */
  .add-new { display: flex; align-items: center; gap: 5px; padding: 5px 6px; border-radius: 4px; font-size: 13px; color: #9b9a97; cursor: pointer; transition: background 0.1s; margin-top: 4px; }
  .add-new:hover { background: #f7f7f5; color: #37352f; }
  .add-group { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; font-size: 13px; color: #9b9a97; cursor: pointer; transition: background 0.1s; white-space: nowrap; margin-top: 2px; flex-shrink: 0; align-self: flex-start; }
  .add-group:hover { background: #f7f7f5; color: #37352f; }
</style>
</head>
<body>

      { id:"c21", title:"Mailboxes & Schedule", tag:"Setup", tagBg:"#cffafe", tagText:"#0e7490",
        tasks:["Assign 10 sending mailboxes per campaign","Different mailboxes per campaign (segregate deliverability)","Send limit: 30–50 emails/mailbox/day","Schedule: Mon–Sat, 7am–7pm target timezone","Email type: Text Only (no HTML, no tracking pixels)"]},

// State
const state = {
  checked: {},
  openCards: {},
  statuses: {},
  openDropdown: null,
};

const STATUS_OPTIONS = [
  { key: "not_started", label: "Not started", color: "#9b9a97" },
  { key: "in_progress", label: "In progress",  color: "#2563eb" },
  { key: "done",        label: "Done",          color: "#16a34a" },
];

function getStatus(colId) {
  return state.statuses[colId] || "not_started";
}

function colProgress(col) {
  const keys = col.cards.flatMap(c => c.tasks.map((_, i) => `${c.id}-${i}`));
  const done = keys.filter(k => state.checked[k]).length;
  return { done, total: keys.length };
}

function globalProgress() {
  let done = 0, total = 0;
  BOARD_DATA.forEach(col => { const p = colProgress(col); done += p.done; total += p.total; });
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

function cardProgress(card) {
  const done = card.tasks.filter((_, i) => state.checked[`${card.id}-${i}`]).length;
  return { done, total: card.tasks.length, pct: card.tasks.length ? Math.round((done / card.tasks.length) * 100) : 0 };
}

function toggleTask(cardId, idx) {
  const key = `${cardId}-${idx}`;
  state.checked[key] = !state.checked[key];
  render();
}

function toggleCard(cardId) {
  state.openCards[cardId] = !state.openCards[cardId];
  render();
}

function setStatus(colId, status) {
  state.statuses[colId] = status;
  state.openDropdown = null;
  render();
}

function toggleDropdown(colId) {
  state.openDropdown = state.openDropdown === colId ? null : colId;
  render();
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.status-btn') && state.openDropdown) {
    state.openDropdown = null;
    render();
  }
});

function render() {
  const gp = globalProgress();
  const totalTasks = gp.total;
  const doneTasks = gp.done;

  let html = `
  <div class="topnav">
    <div class="breadcrumb">
      <span>🏠</span>
      <span class="sep">›</span>
      <span>Workspace</span>
      <span class="sep">›</span>
      <span class="current">Sell an AI Service From Scratch</span>
    </div>
    <div class="nav-progress-wrap">
      <div class="nav-progress-bar"><div class="nav-progress-fill" style="width:${gp.pct}%"></div></div>
      <span class="nav-pct">${gp.pct}%</span>
      <span style="font-size:11px;color:#9b9a97">${doneTasks}/${totalTasks} tasks</span>
    </div>
  </div>

  <div class="page-header">
    <span class="page-emoji">📋</span>
    <div class="page-title">Sell an AI Service From Scratch</div>
    <div class="page-subtitle">Cold outreach execution board · Based on "I Tried to Sell a New AI Service in 3 Hours"</div>
    <div class="props">
      <div class="prop"><span class="prop-icon">📋</span><span class="prop-label">Type</span>&nbsp;<span class="prop-value">Board</span></div>
      <div class="prop"><span class="prop-icon">✅</span><span class="prop-label">Tasks</span>&nbsp;<span class="prop-value">${doneTasks}/${totalTasks} done</span></div>
      <div class="prop"><span class="prop-icon">⏱</span><span class="prop-label">Est. time</span>&nbsp;<span class="prop-value">~6–8 hrs</span></div>
      <div class="prop"><span class="prop-icon">🎯</span><span class="prop-label">Target</span>&nbsp;<span class="prop-value">20 meetings in 60 days</span></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="view-tabs">
    <div class="tab active">⊞ Board view</div>
    <div class="tab" style="color:#9b9a97;font-size:12px">+ Add a view</div>
  </div>

  <div class="board-wrap">`;

  BOARD_DATA.forEach(col => {
    const prog = colProgress(col);
    const pct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;
    const statusKey = getStatus(col.id);
    const status = STATUS_OPTIONS.find(s => s.key === statusKey);
    const dropOpen = state.openDropdown === col.id;

    html += `<div class="col">
      <div class="col-head">
        <div class="col-title-row">
          <span class="col-icon">${col.icon}</span>
          <span class="col-name">${col.title}</span>
          <span class="col-count">${prog.done}/${prog.total}</span>
        </div>
        <div class="col-meta">
          <span class="step-badge" style="background:${col.badge};color:${col.badgeText}">${col.label}</span>
          <span class="col-time">${col.time}</span>
          <div style="position:relative;margin-left:auto">
            <button class="status-btn" onclick="event.stopPropagation();toggleDropdown('${col.id}')">
              <span class="status-dot" style="background:${status.color}"></span>
              ${status.label}
              <span style="font-size:9px;color:#9b9a97">▾</span>
            </button>
            ${dropOpen ? `<div class="status-dropdown">
              ${STATUS_OPTIONS.map(opt => `
                <div class="status-opt" onclick="setStatus('${col.id}','${opt.key}')">
                  <span class="status-dot" style="background:${opt.color}"></span>
                  ${opt.label}
                  ${statusKey === opt.key ? '<span style="margin-left:auto;color:#9b9a97;font-size:11px">✓</span>' : ''}
                </div>`).join('')}
            </div>` : ''}
          </div>
        </div>
        <div class="col-progress">
          <div class="col-progress-fill" style="width:${pct}%;background:${col.color}"></div>
        </div>
      </div>
      <div class="cards">`;

    col.cards.forEach(card => {
      const cp = cardProgress(card);
      const open = !!state.openCards[card.id];
      const allDone = cp.done === cp.total;

      html += `<div class="card">
        <div class="card-head" onclick="toggleCard('${card.id}')">
          <div class="card-cb ${allDone ? 'done' : ''}" onclick="event.stopPropagation()"></div>
          <div class="card-body">
            <div class="card-title ${allDone ? 'done' : ''}">${card.title}</div>
            <div class="card-meta">
              <span class="tag" style="background:${card.tagBg};color:${card.tagText}">${card.tag}</span>
              <div class="card-mini-progress"><div class="card-mini-fill" style="width:${cp.pct}%;background:${col.color}"></div></div>
              <span class="card-task-count">${cp.done}/${cp.total}</span>
            </div>
          </div>
          <span class="card-arrow ${open ? 'open' : ''}">▲</span>
        </div>`;

      if (open) {
        html += `<div class="task-list">`;
        card.tasks.forEach((task, i) => {
          const key = `${card.id}-${i}`;
          const done = !!state.checked[key];
          html += `<div class="task-item" onclick="toggleTask('${card.id}',${i})">
            <div class="task-cb ${done ? 'done' : ''}"></div>
            <span class="task-text ${done ? 'done' : ''}">${task}</span>
          </div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });

    html += `<div class="add-new"><span>+</span> New</div>
      </div>
    </div>`;
  });

  html += `<div class="add-group"><span>+</span> Add a group</div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

window.toggleTask = toggleTask;
window.toggleCard = toggleCard;
window.setStatus = setStatus;
window.toggleDropdown = toggleDropdown;

render();
</script>

<div id="app"></div>
</body>
</html>
